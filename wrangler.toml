name = "pingflare"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./frontend/build"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "pingflare"
migrations_dir = "drizzle"

[triggers]
crons = [
  "* * * * *"
]

[placement]
mode = "smart"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = false
invocation_logs = false